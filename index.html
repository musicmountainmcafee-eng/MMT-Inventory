<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MMT Warehouse Catalogue</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #3B6D11; --purple: #534AB7; --blue: #185FA5;
    --green-light: #EAF3DE; --green-dark: #27500A;
    --purple-light: #EEEDFE; --purple-dark: #3C3489;
    --blue-light: #E6F1FB; --blue-dark: #0C447C;
    --bg: #f8f7f4; --surface: #ffffff;
    --border: rgba(0,0,0,0.1); --border-hover: rgba(83,74,183,0.4);
    --text: #1a1a1a; --text-muted: #6b6b6b; --text-faint: #aaaaaa;
    --radius: 12px; --radius-sm: 8px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 1100px; margin: 0 auto; }
  .header { background: linear-gradient(135deg, var(--green) 0%, var(--purple) 55%, var(--blue) 100%); border-radius: var(--radius); padding: 2.5rem 2rem; margin-bottom: 1.5rem; position: relative; overflow: hidden; }
  .header::before { content: ''; position: absolute; top: -40px; right: -40px; width: 200px; height: 200px; border-radius: 50%; background: rgba(255,255,255,0.05); }
  .header h1 { color: white; font-size: 2rem; font-weight: 600; letter-spacing: -0.5px; }
  .header p { color: rgba(255,255,255,0.75); font-size: 0.95rem; margin-top: 6px; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem; }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-val { font-size: 1.75rem; font-weight: 600; }
  .stat-val.green { color: var(--green); } .stat-val.purple { color: var(--purple); } .stat-val.blue { color: var(--blue); }
  .controls { display: flex; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .search-wrap { flex: 1; min-width: 200px; position: relative; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-faint); pointer-events: none; width: 16px; height: 16px; }
  .controls input { width: 100%; padding: 10px 12px 10px 36px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--text); outline: none; transition: border-color 0.15s; }
  .controls input:focus { border-color: var(--purple); }
  .controls select { padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--text); outline: none; cursor: pointer; }
  .controls select:focus { border-color: var(--purple); }
  .view-toggle { display: flex; gap: 4px; }
  .view-btn { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text-muted); cursor: pointer; font-size: 16px; transition: all 0.15s; }
  .view-btn.active { background: var(--purple-light); color: var(--purple); border-color: var(--purple); }
  .refresh-bar { display: flex; justify-content: flex-end; margin-bottom: 0.75rem; }
  .refresh-btn { font-size: 12px; color: var(--text-muted); background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 5px; padding: 4px 8px; border-radius: var(--radius-sm); transition: background 0.15s; }
  .refresh-btn:hover { background: var(--surface); color: var(--purple); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s; display: flex; flex-direction: column; }
  .card:hover { border-color: var(--purple); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(83,74,183,0.12); }
  .card-img { width: 100%; height: 140px; background: var(--bg); overflow: hidden; display: flex; align-items: center; justify-content: center; color: var(--text-faint); flex-direction: column; gap: 6px; }
  .card-img img { width: 100%; height: 140px; object-fit: cover; }
  .card-img svg { width: 32px; height: 32px; opacity: 0.3; }
  .card-body { padding: 1rem; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-name { font-size: 15px; font-weight: 600; line-height: 1.3; }
  .badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 99px; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.3px; }
  .badge-in { background: var(--green-light); color: var(--green-dark); }
  .badge-out { background: var(--purple-light); color: var(--purple-dark); }
  .card-tag { font-size: 11px; color: var(--text-faint); font-family: 'DM Mono', monospace; }
  .cat-pill { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 99px; background: var(--blue-light); color: var(--blue-dark); font-weight: 500; }
  .card-loc { display: flex; gap: 5px; align-items: center; font-size: 13px; color: var(--text-muted); }
  .card-loc svg { width: 13px; height: 13px; color: var(--purple); flex-shrink: 0; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid var(--border); margin-top: auto; }
  .rental-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 2px; }
  .rental-val { font-size: 17px; font-weight: 600; }
  .more-chip { font-size: 11px; padding: 4px 10px; border-radius: 99px; border: 1px solid var(--border); color: var(--text-muted); background: transparent; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .more-chip:hover { background: var(--purple-light); color: var(--purple); border-color: var(--purple); }
  .list { display: flex; flex-direction: column; gap: 6px; }
  .list-row { display: flex; align-items: center; gap: 12px; padding: 10px 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; transition: border-color 0.15s; }
  .list-row:hover { border-color: var(--purple); }
  .list-thumb { width: 42px; height: 42px; border-radius: 8px; background: var(--bg); overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--text-faint); }
  .list-thumb img { width: 42px; height: 42px; object-fit: cover; }
  .list-thumb svg { width: 18px; height: 18px; opacity: 0.3; }
  .list-name { flex: 1; font-size: 14px; font-weight: 600; }
  .list-tag { font-size: 11px; color: var(--text-faint); font-family: 'DM Mono', monospace; min-width: 120px; }
  .list-cat { min-width: 90px; }
  .list-loc { flex: 1; font-size: 13px; color: var(--text-muted); }
  .list-price { font-size: 14px; font-weight: 600; min-width: 55px; text-align: right; }
  .message { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
  .message svg { width: 40px; height: 40px; opacity: 0.3; margin: 0 auto 12px; display: block; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; backdrop-filter: blur(2px); }
  .modal { background: var(--surface); border-radius: var(--radius); width: 100%; max-width: 500px; overflow: hidden; box-shadow: 0 24px 64px rgba(0,0,0,0.2); animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .modal-img { width: 100%; height: 240px; background: var(--bg); display: flex; align-items: center; justify-content: center; overflow: hidden; color: var(--text-faint); flex-direction: column; gap: 8px; }
  .modal-img img { width: 100%; height: 240px; object-fit: cover; }
  .modal-img svg { width: 48px; height: 48px; opacity: 0.2; }
  .modal-body { padding: 1.5rem; }
  .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.25rem; }
  .modal-title { font-size: 1.25rem; font-weight: 600; }
  .close-btn { background: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; transition: background 0.15s; line-height: 1; }
  .close-btn:hover { background: var(--purple-light); color: var(--purple); }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .mf { display: flex; flex-direction: column; gap: 4px; }
  .mf-label { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 500; }
  .mf-val { font-size: 14px; font-weight: 500; }
  .mf-val.mono { font-family: 'DM Mono', monospace; font-size: 12px; }
  .modal-divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>MMT Warehouse Catalogue</h1>
    <p>Browse available props, furniture &amp; scenic elements for rent</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-label">Total items</div><div class="stat-val purple" id="total-count">—</div></div>
    <div class="stat"><div class="stat-label">Available</div><div class="stat-val green" id="avail-count">—</div></div>
    <div class="stat"><div class="stat-label">Currently out</div><div class="stat-val blue" id="out-count">—</div></div>
    <div class="stat"><div class="stat-label">Categories</div><div class="stat-val" id="cat-count">—</div></div>
  </div>
  <div class="controls">
    <div class="search-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Search items, categories, locations..." oninput="render()" />
    </div>
    <select id="cat-filter" onchange="render()"><option value="">All categories</option></select>
    <select id="status-filter" onchange="render()">
      <option value="">All statuses</option>
      <option value="IN">Available</option>
      <option value="OUT">Out</option>
    </select>
    <div class="view-toggle">
      <button class="view-btn active" id="grid-btn" onclick="setView('grid')" title="Grid view">&#9783;</button>
      <button class="view-btn" id="list-btn" onclick="setView('list')" title="List view">&#9776;</button>
    </div>
  </div>
  <div class="refresh-bar">
    <button class="refresh-btn" onclick="loadData()">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Refresh data
    </button>
  </div>
  <div id="results"><div class="message"><p>Loading inventory...</p></div></div>
</div>

<div id="modal-overlay" class="overlay" style="display:none;" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-img" id="modal-img"></div>
    <div class="modal-body">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modal-name"></div>
          <div style="margin-top:6px;" id="modal-badge"></div>
        </div>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-grid">
        <div class="mf"><div class="mf-label">Tag ID</div><div class="mf-val mono" id="modal-tag"></div></div>
        <div class="mf"><div class="mf-label">Category</div><div class="mf-val" id="modal-cat"></div></div>
        <div class="mf"><div class="mf-label">Storage location</div><div class="mf-val" id="modal-loc"></div></div>
        <div class="mf"><div class="mf-label">Subcategory</div><div class="mf-val" id="modal-sub"></div></div>
        <div class="mf"><div class="mf-label">Rental rate</div><div class="mf-val" id="modal-rental"></div></div>
        <div class="mf"><div class="mf-label">Replacement value</div><div class="mf-val" id="modal-replace"></div></div>
      </div>
      <hr class="modal-divider" />
      <div class="mf"><div class="mf-label">Notes</div><div class="mf-val" id="modal-notes" style="font-size:13px;color:var(--text-muted);font-weight:400;"></div></div>
    </div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRupSW2TcKEhcXbsDg5FRWaQgRzjkgDKvRFduvVwpdwCsMers-HJRwK4lK1AmAH4qO74ZBrmvJzOO25/pub?gid=0&single=true&output=csv';

function driveThumb(raw) {
  if (!raw) return '';
  if (raw.includes('cloudinary.com')) return raw.replace('/upload/', '/upload/w_400,c_fill/');
  const m = raw.match(/id=([\w-]+)/) || raw.match(/\/d\/([\w-]+)\//);
  return m ? 'https://drive.google.com/thumbnail?id=' + m[1] + '&sz=w400' : raw;
}

function splitLine(line) {
  const vals = []; let cur = '', inQ = false;
  for (let c of line) {
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { vals.push(cur); cur = ''; }
    else cur += c;
  }
  vals.push(cur); return vals;
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = splitLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = splitLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (vals[i] || '').trim());
    return obj;
  }).filter(r => r['Asset ID'] && r['Name']);
}

let allItems = [], view = 'grid';

const photoSVG = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>`;
const pinSVG = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;

async function loadData() {
  document.getElementById('results').innerHTML = '<div class="message"><p>Loading inventory...</p></div>';
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error();
    const text = await res.text();
    const rows = parseCSV(text);
    allItems = rows.map((r, idx) => ({
      _idx: idx,
      tagId: r['Tag ID'] || '',
      name: r['Name'] || '',
      category: r['Category'] || '',
      subcategory: r['Subcatagorey'] || '',
      location: r['Storage Location'] || '',
      status: (r['Status'] || '').toUpperCase(),
      rental: r['Rental Value'] || '',
      replacement: r['Replacement Value'] || '',
      notes: r['Notes'] || '',
      photo: driveThumb(r['Photo'] || ''),
    }));
    const cats = [...new Set(allItems.map(i => i.category).filter(Boolean))].sort();
    document.getElementById('cat-filter').innerHTML = '<option value="">All categories</option>' + cats.map(c => `<option>${c}</option>`).join('');
    render();
  } catch(e) {
    document.getElementById('results').innerHTML = '<div class="message"><p style="color:#c0392b;">Could not load inventory.<br><small>Make sure the sheet is published to web.</small></p></div>';
  }
}

function setView(v) {
  view = v;
  document.getElementById('grid-btn').classList.toggle('active', v === 'grid');
  document.getElementById('list-btn').classList.toggle('active', v === 'list');
  render();
}

function openModal(idx, e) {
  if (e) e.stopPropagation();
  const i = allItems[idx];
  document.getElementById('modal-name').textContent = i.name;
  document.getElementById('modal-tag').textContent = i.tagId || '—';
  document.getElementById('modal-cat').textContent = i.category || '—';
  document.getElementById('modal-loc').textContent = i.location || '—';
  document.getElementById('modal-sub').textContent = i.subcategory || '—';
  document.getElementById('modal-rental').textContent = i.rental ? '$' + i.rental : '—';
  document.getElementById('modal-replace').textContent = i.replacement ? '$' + i.replacement : '—';
  document.getElementById('modal-notes').textContent = i.notes || 'No notes on file.';
  document.getElementById('modal-badge').innerHTML = `<span class="badge ${i.status==='IN'?'badge-in':'badge-out'}">${i.status==='IN'?'Available':'Currently out'}</span>`;
  document.getElementById('modal-img').innerHTML = i.photo
    ? `<img src="${i.photo}" alt="${i.name}" onerror="this.parentElement.innerHTML='${photoSVG}<span style=&quot;font-size:13px;&quot;>No photo available</span>'" />`
    : `${photoSVG}<span style="font-size:13px;">No photo yet</span>`;
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').style.display = 'none';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  const status = document.getElementById('status-filter').value;
  const filtered = allItems.filter(i =>
    (!q || [i.name,i.tagId,i.category,i.location,i.subcategory].some(f=>f.toLowerCase().includes(q))) &&
    (!cat || i.category===cat) && (!status || i.status===status)
  );
  document.getElementById('total-count').textContent = allItems.length;
  document.getElementById('avail-count').textContent = allItems.filter(i=>i.status==='IN').length;
  document.getElementById('out-count').textContent = allItems.filter(i=>i.status==='OUT').length;
  document.getElementById('cat-count').textContent = [...new Set(allItems.map(i=>i.category).filter(Boolean))].length;
  const container = document.getElementById('results');
  if (!filtered.length) { container.innerHTML = '<div class="message"><p>No items match your filters.</p></div>'; return; }
  if (view === 'grid') {
    container.innerHTML = '<div class="grid">' + filtered.map(i => `
      <div class="card" onclick="openModal(${i._idx})">
        <div class="card-img">${i.photo ? `<img src="${i.photo}" alt="${i.name}" onerror="this.parentElement.innerHTML=\'${photoSVG.replace(/'/g,"\\'").replace(/"/g,"'")}\'" />` : photoSVG}</div>
        <div class="card-body">
          <div class="card-top"><span class="card-name">${i.name}</span><span class="badge ${i.status==='IN'?'badge-in':'badge-out'}">${i.status==='IN'?'In':'Out'}</span></div>
          <div class="card-tag">${i.tagId}</div>
          <span class="cat-pill">${i.category}${i.subcategory?' · '+i.subcategory:''}</span>
          <div class="card-loc">${pinSVG}<span>${i.location||'—'}</span></div>
          <div class="card-footer">
            <div><div class="rental-label">Rental rate</div><div class="rental-val">${i.rental?'$'+i.rental:'—'}</div></div>
            <button class="more-chip" onclick="openModal(${i._idx},event)">More info</button>
          </div>
        </div>
      </div>`).join('') + '</div>';
  } else {
    container.innerHTML = '<div class="list">' + filtered.map(i => `
      <div class="list-row" onclick="openModal(${i._idx})">
        <div class="list-thumb">${i.photo ? `<img src="${i.photo}" alt="${i.name}" onerror="this.parentElement.innerHTML=\'${photoSVG.replace(/'/g,"\\'")}\'"/>` : photoSVG}</div>
        <span class="badge ${i.status==='IN'?'badge-in':'badge-out'}">${i.status==='IN'?'In':'Out'}</span>
        <span class="list-name">${i.name}</span>
        <span class="list-tag">${i.tagId}</span>
        <span class="list-cat"><span class="cat-pill">${i.category}</span></span>
        <span class="list-loc">${i.location||'—'}</span>
        <span class="list-price">${i.rental?'$'+i.rental:'—'}</span>
      </div>`).join('') + '</div>';
  }
}

loadData();
</script>
</body>
</html>
